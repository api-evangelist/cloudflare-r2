      minLength: 3
      pattern: ^[a-z0-9]([a-z0-9\-]*[a-z0-9])?$
      type: string
    r2-data-catalog_catalog-list:
      description: Contains the list of catalogs.
      properties:
        warehouses:
          description: Lists catalogs in the account.
          items:
            $ref: '#/components/schemas/r2-data-catalog_catalog'
          type: array
      required:
      - warehouses
      type: object
    r2-data-catalog_namespace-list-response:
      description: Contains the list of namespaces with optional pagination.
      properties:
        details:
          description: |
            Contains detailed metadata for each namespace when return_details is true.
            Each object includes the namespace, UUID, and timestamps.
          items:
            $ref: '#/components/schemas/r2-data-catalog_namespace-details'
          nullable: true
          type: array
        namespace_uuids:
          description: |
            Contains UUIDs for each namespace when return_uuids is true.
            The order corresponds to the namespaces array.
          example:
          - 0199b999-6869-7383-bb1f-d30e059d5326
          - 0199b99b-2c88-73b3-8dbb-421e0e8f2757
          items:
            format: uuid
            type: string
          nullable: true
          type: array
        namespaces:
          description: Lists namespaces in the catalog.
          items:
            $ref: '#/components/schemas/r2-data-catalog_namespace-identifier'
          type: array
        next_page_token:
          description: |
            Use this opaque token to fetch the next page of results.
            A null or absent value indicates the last page.
          example: MSYxNzU5NzU1NTc4NTA0MTk0JjAxOTliOTliLTJjODgtNzNiMy04ZGJiLTQyMWUwZThmMjc1Nw
          nullable: true
          type: string
      required:
      - namespaces
      type: object
    r2-data-catalog_namespace-details:
      description: Contains namespace with metadata details.
      properties:
        created_at:
          description: Indicates the creation timestamp in ISO 8601 format.
          format: date-time
          nullable: true
          type: string
        namespace:
          $ref: '#/components/schemas/r2-data-catalog_namespace-identifier'
        namespace_uuid:
          description: Contains the UUID that persists across renames.
          format: uuid
          type: string
        updated_at:
          description: Shows the last update timestamp in ISO 8601 format. Null if never updated.
          format: date-time
          nullable: true
          type: string
      required:
      - namespace
      - namespace_uuid
      type: object
    r2-data-catalog_namespace-identifier:
      description: |
        Specifies the hierarchical namespace parts as an array of strings.
        For example, ["bronze", "analytics"] represents the namespace "bronze.analytics".
      example:
      - bronze
      - analytics
      items:
        type: string
      maxItems: 16
      minItems: 1
      type: array
    r2-data-catalog_table-list-response:
      description: Contains the list of tables with optional pagination.
      properties:
        details:
          description: |
            Contains detailed metadata for each table when return_details is true.
            Each object includes identifier, UUID, timestamps, and locations.
          items:
            $ref: '#/components/schemas/r2-data-catalog_table-details'
          nullable: true
          type: array
        identifiers:
          description: Lists tables in the namespace.
          items:
            $ref: '#/components/schemas/r2-data-catalog_table-identifier'
          type: array
        next_page_token:
          description: |
            Use this opaque token to fetch the next page of results.
            A null or absent value indicates the last page.
          example: MSYxNzU5NzU2MTI4NTU2Njk2JjAxOTliOWEzLTkxMmUtN2ZhMS05YzllLTg5MTAxMGQzYTg0MQ
          nullable: true
          type: string
        table_uuids:
          description: |
            Contains UUIDs for each table when return_uuids is true.
            The order corresponds to the identifiers array.
          example:
          - 0199b9a1-28a0-71e0-a73e-b0fc32c8468e
          - 0199b9a1-3c74-7731-bf53-d8c67ead079d
          items:
            format: uuid
            type: string
          nullable: true
          type: array
      required:
      - identifiers
      type: object
    r2-data-catalog_table-identifier:
      description: Specifies a unique table identifier within a catalog.
      properties:
        name:
          description: Specifies the table name.
          example: events
          type: string
        namespace:
          $ref: '#/components/schemas/r2-data-catalog_namespace-identifier'
      required:
      - namespace
      - name
      type: object
    r2-data-catalog_table-details:
      description: Contains table with metadata.
      properties:
        created_at:
          description: Indicates the creation timestamp in ISO 8601 format.
          format: date-time
          nullable: true
          type: string
        identifier:
          $ref: '#/components/schemas/r2-data-catalog_table-identifier'
        location:
          description: Specifies the base S3 URI for table storage location.
          nullable: true
          type: string
        metadata_location:
          description: Contains the S3 URI to table metadata file. Null for staged tables.
          nullable: true
          type: string
        table_uuid:
          description: Contains the UUID that persists across renames.
          format: uuid
          type: string
        updated_at:
          description: Shows the last update timestamp in ISO 8601 format. Null if never updated.
          format: date-time
          nullable: true
          type: string
      required:
      - identifier
      - table_uuid
      type: object
    r2_r2_put_object_result:
      description: Result of a successful object upload.
      properties:
        etag:
          description: The entity tag for the uploaded object.
          example: d41d8cd98f00b204e9800998ecf8427e
          type: string
        key:
          description: The key (name) of the uploaded object.
          example: path/to/my-object.txt
          type: string
        size:
          description: The size of the uploaded object in bytes (as a string).
          example: "1048576"
          type: string
        storage_class:
          $ref: '#/components/schemas/r2_storage_class'
        uploaded:
          description: The date and time the object was uploaded.
          example: "2024-01-15T10:30:00Z"
          format: date-time
          type: string
        version:
          description: The version UUID of the uploaded object.
          example: 3fd5b4a8-1234-5678-abcd-ef0123456789
          type: string
      type: object
    r2_r2_delete_objects_by_prefix_result:
      description: |
        Descriptor of an asynchronous prefix-delete job, returned when the bulk
        delete-objects endpoint is invoked with a `prefix` query parameter.
      properties:
        endTime:
          description: When the job finished, if it has finished.
          format: date-time
          type: string
        id:
          description: Unique identifier for the prefix-delete job.
          type: string
        jobType:
          description: The job kind. Always `prefixDelete` for this endpoint.
          enum:
          - prefixDelete
          type: string
        prefixDelete:
          description: Details specific to the prefix-delete job.
          properties:
            deletedObjects:
              description: Number of objects deleted by the job so far.
              example: 0
              type: integer
            isBucketClear:
              description: |
                True when the job was created to clear the entire bucket
                (i.e. an empty prefix). Distinguishes bucket-level clear operations
                from prefix-specific delete operations.
              type: boolean
            prefix:
              description: The prefix matched against object keys for deletion.
              example: path/to/
              type: string
          type: object
        startTime:
          description: When the job was created.
          format: date-time
          type: string
        status:
          description: Lifecycle status of the job.
          enum:
          - ENQUEUED
          - RUNNING
          - COMPLETED
          - FAILED
          - CANCELLED
          type: string
      type: object
    r2-data-catalog_table-maintenance-update-request:
      allOf:
      - $ref: '#/components/schemas/r2-data-catalog_maintenance-update-params'
      description: Contains request to update table maintenance configuration.
    r2_temp_access_creds_response:
      example:
        accessKeyId: example-access-key-id
        secretAccessKey: example-secret-key
        sessionToken: example-session-token
      properties:
        accessKeyId:
          description: ID for new access key.
          type: string
        secretAccessKey:
          description: Secret access key.
          type: string
          x-sensitive: true
        sessionToken:
          description: Security token.
          type: string
          x-sensitive: true
      type: object
    r2_local_uploads_configuration:
      description: Configuration for local uploads on a bucket.
      properties:
        enabled:
          description: Whether local uploads is enabled for this bucket. When enabled, object's data is written to the nearest region first, then asynchronously replicated to the bucket's primary region.
          type: boolean
          x-auditable: true
      type: object
    r2_account_level_metrics:
      description: Metrics based on the class they belong to.
      properties:
        infrequentAccess:
          $ref: '#/components/schemas/r2_class_based_metrics'
        standard:
          $ref: '#/components/schemas/r2_class_based_metrics'
      type: object
    r2_class_based_metrics:
      description: Metrics based on what state they are in(uploaded or published).
      properties:
        published:
          $ref: '#/components/schemas/r2_object_size_metrics'
        uploaded:
          $ref: '#/components/schemas/r2_object_size_metrics'
      type: object
    r2_object_size_metrics:
      description: Metrics on number of objects/amount of storage used.
      properties:
        metadataSize:
          description: Amount of.
          type: number
        objects:
          description: Number of objects stored.
          type: number
        payloadSize:
          description: Amount of storage used by object data.
          type: number
      type: object
    r2_enable_sippy_gcs:
      properties:
        destination:
          description: R2 bucket to copy objects to.
          properties:
            accessKeyId:
              description: |
                ID of a Cloudflare API token.
                This is the value labelled "Access Key ID" when creating an API.
                token from the [R2 dashboard](https://dash.cloudflare.com/?to=/:account/r2/api-tokens).

                Sippy will use this token when writing objects to R2, so it is
                best to scope this token to the bucket you're enabling Sippy for.
              type: string
            provider:
              enum:
              - r2
              type: string
            secretAccessKey:
              description: |
                Value of a Cloudflare API token.
                This is the value labelled "Secret Access Key" when creating an API.
                token from the [R2 dashboard](https://dash.cloudflare.com/?to=/:account/r2/api-tokens).

                Sippy will use this token when writing objects to R2, so it is
                best to scope this token to the bucket you're enabling Sippy for.
              type: string
              x-sensitive: true
          type: object
        source:
          description: GCS bucket to copy objects from.
          properties:
            bucket:
              description: Name of the GCS bucket.
              type: string
              x-auditable: true
            clientEmail:
              description: Client email of an IAM credential (ideally scoped to a single GCS bucket).
              type: string
            privateKey:
              description: Private Key of an IAM credential (ideally scoped to a single GCS bucket).
              type: string
              x-sensitive: true
            provider:
              enum:
              - gcs
              type: string
          type: object
    r2-data-catalog_catalog-credential-request:
      description: Contains request to store catalog credentials.
      properties:
        token:
          description: Provides the Cloudflare API token for accessing R2.
          example: your-cloudflare-api-token-here
          type: string
      required:
      - token
      type: object
    r2_v4_response_failure:
      properties:
        errors:
          $ref: '#/components/schemas/r2_errors'
        messages:
          $ref: '#/components/schemas/r2_messages'
        result:
          enum:
          - 
          nullable: true
          type: object
        success:
          description: Whether the API call was successful.
          enum:
          - false
          example: false
          type: boolean
      required:
      - success
      - errors
      - messages
      - result
      type: object
    r2_enable_sippy_aws:
      properties:
        destination:
          description: R2 bucket to copy objects to.
          properties:
            accessKeyId:
              description: |
                ID of a Cloudflare API token.
                This is the value labelled "Access Key ID" when creating an API.
                token from the [R2 dashboard](https://dash.cloudflare.com/?to=/:account/r2/api-tokens).

                Sippy will use this token when writing objects to R2, so it is
                best to scope this token to the bucket you're enabling Sippy for.
              type: string
            provider:
              enum:
              - r2
              type: string
              x-auditable: true
            secretAccessKey:
              description: |
                Value of a Cloudflare API token.
                This is the value labelled "Secret Access Key" when creating an API.
                token from the [R2 dashboard](https://dash.cloudflare.com/?to=/:account/r2/api-tokens).

                Sippy will use this token when writing objects to R2, so it is
                best to scope this token to the bucket you're enabling Sippy for.
              type: string
              x-sensitive: true
          type: object
        source:
          description: AWS S3 bucket to copy objects from.
          properties:
            accessKeyId:
              description: Access Key ID of an IAM credential (ideally scoped to a single S3 bucket).
              type: string
            bucket:
              description: Name of the AWS S3 bucket.
              type: string
              x-auditable: true
            provider:
              enum:
              - aws
              type: string
              x-auditable: true
            region:
              description: Name of the AWS availability zone.
              type: string
              x-auditable: true
            secretAccessKey:
              description: Secret Access Key of an IAM credential (ideally scoped to a single S3 bucket).
              type: string
              x-sensitive: true
          type: object
  securitySchemes:
    api_email:
      in: header
      name: X-Auth-Email
      type: apiKey
    api_key:
      in: header
      name: X-Auth-Key
      type: apiKey
    api_token:
      scheme: bearer
      type: http
    user_service_key:
      in: header
      name: X-Auth-User-Service-Key
      type: apiKey
